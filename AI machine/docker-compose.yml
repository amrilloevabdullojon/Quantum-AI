services:
  app:
    build:
      context: .
      args:
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_BUILD_VERSION: ${VITE_BUILD_VERSION:-QWG-production}
        VITE_MARKET_DATA_MODE: ${VITE_MARKET_DATA_MODE:-live}
    container_name: qwg-app
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      LOCAL_API_PORT: 8787
      APP_ORIGIN: ${APP_ORIGIN:-http://127.0.0.1:8787}
      ADMIN_ORIGIN: ${ADMIN_ORIGIN:-http://127.0.0.1:8787}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://127.0.0.1:5173}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-guardian}:${POSTGRES_PASSWORD:-guardian}@postgres:5432/${POSTGRES_DB:-guardian}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      COINGECKO_API_BASE_URL: ${COINGECKO_API_BASE_URL:-https://api.coingecko.com/api/v3}
      COINGECKO_DEMO_API_KEY: ${COINGECKO_DEMO_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "127.0.0.1:8787:8787"

  postgres:
    image: postgres:16-alpine
    container_name: qwg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guardian}
      POSTGRES_USER: ${POSTGRES_USER:-guardian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardian}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - qwg-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guardian} -d ${POSTGRES_DB:-guardian}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qwg-postgres-data:
